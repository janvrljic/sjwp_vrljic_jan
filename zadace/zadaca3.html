    type === "serije" ? "Serije" : "Dokumentarci";

    grid.innerHTML += `
      <a href="https://www.imdb.com/title/${item.link}" target="_blank">
        <div class="card">
          <img src="${item.img}">
          <p>${item.title}</p>
        </div>
      </a>
    `;
  });
}

loadContent('filmovi');
</script>
