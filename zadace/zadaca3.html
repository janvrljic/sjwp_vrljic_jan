<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerija</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 15px 20px;
}

.menu a {
  margin-left: 20px;
  cursor: pointer;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  text-align: center;
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<nav>
  <div><b>MovieApp</b></div>
  <div class="menu">
    <a onclick="loadContent('movies')">Filmovi</a>
    <a onclick="loadContent('series')">Serije</a>
    <a onclick="loadContent('docs')">Dokumentarci</a>
  </div>
</nav>

<div class="container">

function loadContent(type) {
  const grid = document.getElementById("grid");
  const title = document.getElementById("title");

  grid.innerHTML = "";
  title.innerText =
    type === "movies" ? "Filmovi" :
    type === "series" ? "Serije" : "Dokumentarci";

  data[type].forEach(item => {
    grid.innerHTML += `
      <a href="https://www.imdb.com/title/${item.link}" target="_blank">
        <div class="card">
          <img src="${item.img}">
          <p>${item.title}</p>
        </div>
      </a>
    `;
  });
}
