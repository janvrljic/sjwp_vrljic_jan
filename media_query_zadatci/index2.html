<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Responsive 4 Blocks</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #eee;
  font-family: Arial, sans-serif;
}

.container {
  display: grid;
  gap: 10px;
  width: 90%;
  max-width: 900px;
}

/* Osnovni (Mobile - 1 kolona) */
.container {
  grid-template-columns: 1fr;
}

.item {
  height: 80px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  color: black;
}

/* Boje */
.item1 { background: #ef6b6b; }
.item2 { background: #f39a4a; }
.item3 { background: #e6c85c; }
.item4 { background: #b7d96b; }

/* 📱 Tablet (≥768px) → 2x2 */
@media (min-width: 768px) {
  .container {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(2, 100px);
  }

  .item {
    height: 100%;
  }
}

/* 💻 Desktop (≥1024px) → 4 kolone */
@media (min-width: 1024px) {
  .container {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 150px;
  }
}
</style>
<body>

<div class="container">
  <div class="item item1">1</div>
  <div class="item item2">2</div>
  <div class="item item3">3</div>
  <div class="item item4">4</div>
</div>

</body>
</html>
